x-funkydns-smoke-build: &funkydns_smoke_build
  context: .
  dockerfile: funkydns-smoke/Dockerfile

# Compose layout
# --------------
# Default `compose up` (no profile flag) brings up the chain plus the
# locked-down workload container that gives users the proxychains UX:
#
#     proxy1, proxy2     upstream HTTP CONNECT hops
#     egressd            local CONNECT listener that walks the chain
#     client             the workload container, locked to egressd
#                        (HTTP_PROXY env + iptables fail-closed); this
#                        is what `./hg-proxychains run` and
#                        `./hg-proxychains shell` exec into.
#
# The smoke harness adds a real DNS/DoH path and an echo target. It is
# only needed when you want to prove DoH and the CONNECT chain end to
# end; bring it up explicitly:
#
#     ./hg-proxychains smoke
#     podman-compose --profile smoke up funky searchdns exitserver
#
# `worknet` is internal-only so the workload container cannot bypass
# the chain. `proxynet` is where egressd talks to the upstream hops.

services:
  searchdns:
    profiles: ["smoke"]
    build: *funkydns_smoke_build
    container_name: searchdns
    init: true
    command:
      [
        "python3",
        "/opt/funkydns-smoke/run_funkydns.py",
        "funkydns",
        "server",
        "--dns-port",
        "53",
        "--no-doh",
        "--no-dot",
      ]
    environment:
      - ZONES_DIR=/opt/funkydns-smoke/upstream-zones
      - USE_SYSTEM_RESOLVER=false
      - RESPECT_HOSTS_FILE=false
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "/opt/funkydns-smoke/check_resolution.py",
          "--protocol",
          "dns",
          "--dns-server",
          "127.0.0.1",
          "--name",
          "printer.corp.test",
          "--record-type",
          "A",
          "--expect",
          "198.51.100.42",
          "--expect-owner",
          "printer.corp.test.",
          "--quiet",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - proxynet

  funky:
    profiles: ["smoke"]
    build: *funkydns_smoke_build
    container_name: funky
    init: true
    depends_on:
      searchdns:
        condition: service_healthy
    command:
      [
        "sh",
        "-ec",
        "searchdns_ip=$$(getent hosts \"$${SEARCHDNS_HOST}\" | awk 'NR==1 {print $$1}'); [ -n \"$$searchdns_ip\" ] || { echo \"failed to resolve $${SEARCHDNS_HOST}\" >&2; exit 1; }; printf 'search %s\\nnameserver %s\\noptions ndots:1 timeout:1 attempts:1\\n' \"$${RESOLV_CONF_SEARCH}\" \"$$searchdns_ip\" > \"$${RESOLV_CONF_PATH}\"; exec python3 /opt/funkydns-smoke/run_funkydns.py funkydns server --dns-port 53 --doh-port 443 --cert-path /opt/funkydns-smoke/tls/fullchain.pem --key-path /opt/funkydns-smoke/tls/privkey.pem --no-dot",
      ]
    ports:
      - "15353:53/udp"
      - "15353:53/tcp"
      - "18443:443"
    environment:
      - HOSTS_FILE_PATH=/opt/funkydns-smoke/etc/hosts
      - RESOLV_CONF_PATH=/tmp/funkydns-smoke.resolv.conf
      - RESOLV_CONF_SEARCH=corp.test
      - SEARCHDNS_HOST=searchdns
      - USE_SYSTEM_RESOLVER=true
      - RESPECT_HOSTS_FILE=true
    volumes:
      - ./funkydns-smoke/etc/hosts:/opt/funkydns-smoke/etc/hosts:ro
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "/opt/funkydns-smoke/check_resolution.py",
          "--name",
          "smoke.test",
          "--expect",
          "203.0.113.10",
          "--expect-owner",
          "smoke.test.",
          "--quiet",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - worknet
      - proxynet

  proxy1:
    build: ./proxy
    container_name: proxy1
    init: true
    command: ["pproxy", "-l", "http://0.0.0.0:3128"]
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import socket; s = socket.create_connection(('127.0.0.1', 3128), 2); s.close()",
        ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - proxynet

  proxy2:
    build: ./proxy
    container_name: proxy2
    init: true
    command: ["pproxy", "-l", "http://0.0.0.0:3128"]
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import socket; s = socket.create_connection(('127.0.0.1', 3128), 2); s.close()",
        ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - proxynet

  exitserver:
    profiles: ["smoke"]
    build: ./exitserver
    container_name: exitserver
    init: true
    ports:
      - "9999:9999"
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; body = urllib.request.urlopen('http://127.0.0.1:9999/', timeout=2).read(); assert body == b'OK from exit-server\\n', f'unexpected exitserver body: {body!r}'",
        ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - proxynet

  egressd:
    build: ./egressd
    container_name: egressd
    depends_on:
      proxy1:
        condition: service_healthy
      proxy2:
        condition: service_healthy
    ports:
      - "15001:15001"
      - "9191:9191"
    environment:
      - EGRESSD_CONFIG=/opt/egressd/config.json5
      - PYTHONUNBUFFERED=1
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9191/ready', timeout=2)"
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    networks:
      - worknet
      - proxynet

  client:
    build: ./client
    container_name: client
    init: true
    command: ["serve"]
    stdin_open: true
    tty: true
    cap_add:
      - NET_ADMIN
    depends_on:
      egressd:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "test",
          "-f",
          "/tmp/hg-proxychains-firewall.ready",
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    networks:
      - worknet

networks:
  worknet:
    driver: bridge
    internal: true
  proxynet:
    driver: bridge
