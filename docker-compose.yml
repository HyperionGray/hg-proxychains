x-funkydns-smoke-build: &funkydns_smoke_build
  context: .
  dockerfile: funkydns-smoke/Dockerfile

services:
  searchdns:
    build: *funkydns_smoke_build
    container_name: searchdns
    init: true
    command:
      [
        "python3",
        "/opt/funkydns-smoke/run_funkydns.py",
        "funkydns",
        "server",
        "--dns-port",
        "53",
        "--no-doh",
        "--no-dot",
      ]
    environment:
      - ZONES_DIR=/opt/funkydns-smoke/upstream-zones
      - USE_SYSTEM_RESOLVER=false
      - RESPECT_HOSTS_FILE=false
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "/opt/funkydns-smoke/check_resolution.py",
          "--protocol",
          "dns",
          "--dns-server",
          "127.0.0.1",
          "--name",
          "printer.corp.test",
          "--record-type",
          "A",
          "--expect",
          "198.51.100.42",
          "--expect-owner",
          "printer.corp.test.",
          "--quiet",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - egressnet

  funky:
    build: *funkydns_smoke_build
    container_name: funky
    init: true
    depends_on:
      searchdns:
        condition: service_healthy
    command:
      [
        "sh",
        "-ec",
        "searchdns_ip=$$(getent hosts \"$${SEARCHDNS_HOST}\" | awk 'NR==1 {print $$1}'); [ -n \"$$searchdns_ip\" ] || { echo \"failed to resolve $${SEARCHDNS_HOST}\" >&2; exit 1; }; printf 'search %s\\nnameserver %s\\noptions ndots:1 timeout:1 attempts:1\\n' \"$${RESOLV_CONF_SEARCH}\" \"$$searchdns_ip\" > \"$${RESOLV_CONF_PATH}\"; exec python3 /opt/funkydns-smoke/run_funkydns.py funkydns server --dns-port 53 --doh-port 443 --cert-path /opt/funkydns-smoke/tls/fullchain.pem --key-path /opt/funkydns-smoke/tls/privkey.pem --no-dot",
      ]
    ports:
      - "15353:53/udp"
      - "15353:53/tcp"
      - "18443:443"
    environment:
      - HOSTS_FILE_PATH=/opt/funkydns-smoke/etc/hosts
      - RESOLV_CONF_PATH=/tmp/funkydns-smoke.resolv.conf
      - RESOLV_CONF_SEARCH=corp.test
      - SEARCHDNS_HOST=searchdns
      - USE_SYSTEM_RESOLVER=true
      - RESPECT_HOSTS_FILE=true
    volumes:
      - ./funkydns-smoke/etc/hosts:/opt/funkydns-smoke/etc/hosts:ro
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "/opt/funkydns-smoke/check_resolution.py",
          "--quiet",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - egressnet

  proxy1:
    build: ./proxy
    container_name: proxy1
    init: true
    command: ["pproxy", "-l", "http://0.0.0.0:3128"]
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import socket; s = socket.create_connection(('127.0.0.1', 3128), 2); s.close()",
        ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - egressnet

  proxy2:
    build: ./proxy
    container_name: proxy2
    init: true
    command: ["pproxy", "-l", "http://0.0.0.0:3128"]
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import socket; s = socket.create_connection(('127.0.0.1', 3128), 2); s.close()",
        ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - egressnet

  exitserver:
    build: ./exitserver
    container_name: exitserver
    init: true
    ports:
      - "9999:9999"
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; body = urllib.request.urlopen('http://127.0.0.1:9999/', timeout=2).read(); assert body == b'OK from exit-server\\n'",
        ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - egressnet

  egressd:
    build: ./egressd
    container_name: egressd
    depends_on:
      proxy1:
        condition: service_healthy
      proxy2:
        condition: service_healthy
      funky:
        condition: service_healthy
      exitserver:
        condition: service_healthy
    ports:
      - "15001:15001"
      - "9191:9191"
    environment:
      - EGRESSD_CONFIG=/opt/egressd/config.json5
      - PYTHONUNBUFFERED=1
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9191/ready', timeout=2)"
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    networks:
      - egressnet

  client:
    build: ./client
    container_name: client
    depends_on:
      egressd:
        condition: service_healthy
    networks:
      - egressnet

networks:
  egressnet:
    driver: bridge
