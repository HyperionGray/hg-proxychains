services:
  funky:
    build:
      context: .
      dockerfile: funkydns-smoke/Dockerfile
    container_name: funky
    command:
      [
        "funkydns",
        "server",
        "--dns-port",
        "53",
        "--doh-port",
        "443",
        "--upstream",
        "https://cloudflare-dns.com/dns-query"
      ]
    ports:
      - "5353:53/udp"
      - "5353:53/tcp"
      - "8443:443"
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import socket; s = socket.create_connection(('127.0.0.1', 443), 2); s.close()",
        ]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 15s
    networks:
      egressnet:
        ipv4_address: 172.18.0.10

  proxy1:
    build: ./proxy
    container_name: proxy1
    command: ["pproxy", "-l", "http://0.0.0.0:3128"]
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import socket; s = socket.create_connection(('127.0.0.1', 3128), 2); s.close()",
        ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      egressnet:
        ipv4_address: 172.18.0.11

  proxy2:
    build: ./proxy
    container_name: proxy2
    command: ["pproxy", "-l", "http://0.0.0.0:3128"]
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import socket; s = socket.create_connection(('127.0.0.1', 3128), 2); s.close()",
        ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      egressnet:
        ipv4_address: 172.18.0.12

  exitserver:
    build: ./exitserver
    container_name: exitserver
    ports:
      - "9999:9999"
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import socket; s = socket.create_connection(('127.0.0.1', 9999), 2); s.close()",
        ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      egressnet:
        ipv4_address: 172.18.0.20

  egressd:
    build: ./egressd
    container_name: egressd
    depends_on:
      proxy1:
        condition: service_healthy
      proxy2:
        condition: service_healthy
      funky:
        condition: service_healthy
      exitserver:
        condition: service_healthy
    ports:
      - "15001:15001"
      - "9191:9191"
    environment:
      - EGRESSD_CONFIG=/opt/egressd/config.json5
      - PYTHONUNBUFFERED=1
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import sys, urllib.request; r = urllib.request.urlopen('http://127.0.0.1:9191/ready', timeout=2); sys.exit(0 if r.status == 200 else 1)",
        ]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s
    networks:
      egressnet:
        ipv4_address: 172.18.0.5

  client:
    build: ./client
    container_name: client
    depends_on:
      egressd:
        condition: service_healthy
    networks:
      egressnet:
        ipv4_address: 172.18.0.30

networks:
  egressnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/16
          gateway: 172.18.0.1
