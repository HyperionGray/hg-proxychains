# hg-proxychains wrapper config
#
# A single chain entry that points at the local egressd CONNECT listener.
# egressd in turn forwards the request through the configured upstream
# proxy chain (proxy1 -> proxy2 -> ...). DNS is forced through the proxy
# (proxy_dns) so no name lookups leak around the chain.

strict_chain
proxy_dns
remote_dns_subnet 224
tcp_read_time_out 15000
tcp_connect_time_out 8000
localnet 127.0.0.0/255.0.0.0

[ProxyList]
http  egressd  15001
